<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="pop-up">
        <button id="popUpButton">Start Game</button>
      </div>

      <h1>Rock Paper Scissor</h1>

      <div class="choices">
        <div id="rock" class="choice">Rock</div>
        <div id="paper" class="choice">Paper</div>
        <div id="scissor" class="choice">Scissor</div>
      </div>

      <div class="result">
        <div class="display">You: <span id="your-choice">-</span></div>
        <div class="display">Computer: <span id="computer-choice">-</span></div>
        <div class="display">Result: <span id="result-text">-</span></div>
        <div class="display">Score: <span id="score">0 - 0</span></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
